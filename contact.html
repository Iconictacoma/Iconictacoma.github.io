<!DOCTYPE html>
<html>
<head>
    <title>Contact - IconicIngrams</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar">
            <h2>Pages</h2>
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </aside>

        <main class="main-content">
            <h1>Contact</h1>
            <p>Want to reach out? Use the form below or connect through my socials.</p>
            <form action="#" method="post">
                <label for="name">Name</label><br>
                <input id="name" name="name" type="text" placeholder="Your name" style="width:100%; padding:8px"><br><br>

                <label for="email">Email</label><br>
                <input id="email" name="email" type="email" placeholder="you@example.com" style="width:100%; padding:8px"><br><br>

                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="5" style="width:100%; padding:8px" placeholder="Your message..."></textarea><br><br>

                <button type="submit" style="background:#1f4e79;border:none;color:white;padding:10px 16px;border-radius:5px;cursor:pointer">Send Message</button>
            </form>
            <p>Or email me directly at: <a href="mailto:example@example.com">example@example.com</a></p>
        </main>
    </div>
</body>
</html>
